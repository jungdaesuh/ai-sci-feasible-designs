problem: p1
cycles: 3
random_seed: 123
experiment_tag: "p1_ab_strict_tree"

boundary_template:
  n_poloidal_modes: 6
  n_toroidal_modes: 5
  n_field_periods: 3
  base_major_radius: 1.0
  base_minor_radius: 0.2
  perturbation_scale: 0.05

budgets:
  screen_evals_per_cycle: 20
  promote_top_k: 5
  max_high_fidelity_evals_per_cycle: 20
  wall_clock_minutes: 20
  n_workers: 1
  pool_type: process

adaptive_budgets:
  enabled: false
  hv_slope_reference: 0.05
  feasibility_target: 0.5
  cache_hit_target: 0.3
  screen_evals_per_cycle:
    min: 20
    max: 20
  promote_top_k:
    min: 5
    max: 5
  max_high_fidelity_evals_per_cycle:
    min: 20
    max: 20

fidelity_ladder:
  screen: p1
  promote: p1

stage_gates:
  s1_to_s2_feasibility_margin: 0.001
  s1_to_s2_objective_improvement: 0.01
  s1_to_s2_lookback_cycles: 3
  s2_to_s3_hv_delta: 0.005
  s2_to_s3_lookback_cycles: 3

governance:
  min_feasible_for_promotion: 1
  hv_lookback: 3

proposal_mix:
  constraint_ratio: 0.5
  exploration_ratio: 0.5
  jitter_scale: 0.05
  surrogate_pool_multiplier: 4.0
  sampler_type: near_axis

surrogate:
  backend: neural_operator
  n_ensembles: 1
  learning_rate: 1e-3
  epochs: 10
  hidden_dim: 64
  use_offline_dataset: true

alm:
  maxit: 25
  penalty_parameters_initial: 10.0
  bounds_initial: 0.5
  oracle_budget_initial: 20
  oracle_budget_increment: 10
  oracle_budget_max: 40
  oracle_num_workers: 1

aso:
  enabled: true
  supervision_mode: event_triggered
  supervision_interval: 10
  use_heuristic_fallback: true
  seed_fallback_policy: forbid
  steps_per_supervision: 2
  stagnation_violation_threshold: 0.01
  max_penalty_boost: 10.0
  feasibility_threshold: 1e-4
  staged_governor_enabled: true
  tree_evolution_enabled: true
  offspring_per_parent: 3
  parent_group_size: 2
  tree_queue_max: 24
  tree_branch_budget: 2
  experience_injection_probability: 0.5

generative:
  enabled: false
  backend: diffusion
  checkpoint_path: checkpoints/diffusion_v2.pt
  device: cpu
  hidden_dim: 512
  n_layers: 2
  pca_components: 20
  diffusion_timesteps: 50
  batch_size: 512

reporting_dir: reports/p1_ab_strict_tree_det_20260227T083218
memory_db: reports/p1_ab_strict_tree_det_20260227T083218.sqlite
reporting:
  prometheus_export_enabled: false
